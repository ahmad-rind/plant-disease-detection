apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-disease-api
  labels:
    app: plant-disease-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plant-disease-api
  template:
    metadata:
      labels:
        app: plant-disease-api
    spec:
      containers:
      - name: plant-disease-api
        image: YOUR_DOCKERHUB_USERNAME/plant-disease-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: MODEL_PATH
          value: "models/plant_disease_model_v2.h5"
        - name: CLASS_NAMES_PATH
          value: "class_names.json"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 90
          periodSeconds: 30
